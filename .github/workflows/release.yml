name: Release

# Publishes wheel/sdist to PyPI and creates a GitHub Release. Triggered on a
# semver tag push (e.g. v0.2.0), via manual dispatch, or as a reusable
# `workflow_call` (used by `semantic-release.yml`).
#
# Note: Docker image publishing is *not* in this workflow. It lives in
# `semantic-release.yml`'s `docker` job, which builds the image once per
# push to main and applies version tags only when a release was cut. This
# avoids building Docker twice for the same commit.
#
# Prerequisites (one-time repo setup):
#   1. On PyPI, configure Trusted Publisher for project `ddb-explorer-mcp`:
#        owner:     mudassirgithub
#        repo:      ddb-explorer-mcp
#        workflow:  release.yml
#        environment: pypi
#      https://docs.pypi.org/trusted-publishers/
#   2. Create a GitHub Environment named `pypi` (used by the publish job).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist."
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0). Must already exist."
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default least-privilege token. Jobs escalate explicitly when needed.
permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC for build-provenance attestation
      attestations: write   # actions/attest-build-provenance
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Resolve version from tag
        id: version
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Releasing version: ${version}"

      - name: Verify pyproject version matches tag
        run: |
          expected="${{ steps.version.outputs.version }}"
          actual=$(uv run python -c "import tomllib,sys; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag version ($expected) does not match pyproject.toml version ($actual)"
            exit 1
          fi

      - name: Build
        run: uv build

      # SLSA-Level-3 provenance for the wheel and sdist. Verifiable via:
      #   gh attestation verify dist/<file> --owner <owner>
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/*"

      - name: Upload dist/
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ddb-explorer-mcp
    permissions:
      id-token: write       # Trusted Publishing (OIDC)
      attestations: write   # PEP 740 PyPI attestations
    steps:
      - name: Download dist/
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      # `attestations: true` makes gh-action-pypi-publish generate PEP 740
      # attestations and upload them alongside the artifacts. PyPI then
      # displays the verified-publish badge on the project page.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
          attestations: true

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download dist/
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-rc') || contains(inputs.tag || github.ref_name, '-beta') || contains(inputs.tag || github.ref_name, '-alpha') }}
          files: |
            dist/*.whl
            dist/*.tar.gz
