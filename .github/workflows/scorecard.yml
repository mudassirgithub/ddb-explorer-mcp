name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard (https://securityscorecards.dev/) weekly and on
# pushes to main. The score covers branch protection, signed releases, pinned
# dependencies, dangerous workflows, etc. Findings appear under Security →
# Code scanning.
#
# Note: results are NOT published to the public Scorecard API. We keep them
# private (visible only in the repo's Security tab) so the score is a tool
# for the maintainer rather than a public scoreboard. Flip publish_results
# to true below if/when you want a public badge.

on:
  branch_protection_rule:        # re-score when branch protection changes
  push:
    branches: [main]
  schedule:
    - cron: "37 6 * * 1"          # weekly Monday 06:37 UTC
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write     # upload SARIF
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@05b42c624433fc40578a4040d5cf5e36ddca8cde # v2.4.2
        with:
          results_file: results.sarif
          results_format: sarif
          # Keep results private (visible only in the repo's Security tab).
          # Flip to true to publish the score and enable the public badge.
          publish_results: false

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          sarif_file: results.sarif
