name: Semantic Release

# Owns *everything* that happens on a push to main:
#   - `release` job: runs python-semantic-release. If the merge commit is
#     release-worthy (feat/fix/perf/breaking), PSR bumps `pyproject.toml`
#     + `CHANGELOG.md` + `server.json` + `npm/package.json`, commits, and
#     pushes a `vX.Y.Z` tag.
#   - `docker` job: builds the image *once* per push and pushes:
#         - always: `:edge`, `:sha-<short>`
#         - if released: also `:X.Y.Z`, `:X.Y`, `:X`, `:latest`
#   - `build-wheel` job: when released, builds the wheel + sdist and signs
#     SLSA-Level-3 build provenance attestations.
#   - `publish-pypi` job: when released, publishes the wheel/sdist to PyPI
#     via Trusted Publishing (OIDC, no token) with PEP 740 attestations.
#   - `github-release` job: when released, creates the GitHub Release with
#     auto-generated notes and the dist artifacts attached.
#   - `publish-npm` job: when released, calls `npm-publish.yml`
#     (workflow_call) to publish the thin npm wrapper.
#
# PyPI publish steps are inlined directly here (rather than factored into a
# reusable workflow) because PyPI's Trusted Publisher matcher does not fully
# support `workflow_call` indirection — the OIDC token's Build Config URI
# always reflects the entry-point workflow, so the registered Trusted
# Publisher must point at this file. See:
#   https://docs.pypi.org/trusted-publishers/troubleshooting/#reusable-workflows-on-github
#   https://github.com/pypa/gh-action-pypi-publish/issues/166
#
# Trusted Publisher prerequisites (one-time repo setup):
#   1. On PyPI, configure Trusted Publisher for project `ddb-explorer-mcp`:
#        owner:        mudassirgithub
#        repo:         ddb-explorer-mcp
#        workflow:     semantic-release.yml      <- this file
#        environment:  pypi
#      https://docs.pypi.org/trusted-publishers/
#   2. Create a GitHub Environment named `pypi` (used by `publish-pypi`).
#
# How to write commits so this workflow does what you want:
#   feat: ...      -> minor bump (0.X.0)
#   fix: ...       -> patch bump (0.0.X)
#   perf: ...      -> patch bump
#   feat!: ...     -> major bump (X.0.0)   (also: any commit with "BREAKING CHANGE:" in the body)
#   chore/docs/style/refactor/test/ci/build  -> no version bump (still gets :edge)
#
# Branch protection note: if `main` is protected, allow the
# `github-actions[bot]` identity to bypass required PRs/reviews so PSR can
# push the release commit and tag.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: "Force a bump level (prerelease, patch, minor, major)"
        required: false
        type: string
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        type: boolean
        default: false

concurrency:
  group: semantic-release
  cancel-in-progress: false

# Default least-privilege token. Jobs escalate explicitly when needed.
permissions:
  contents: read

jobs:
  release:
    name: Determine next version
    runs-on: ubuntu-latest
    permissions:
      # PSR pushes the chore(release) commit and the vX.Y.Z tag.
      contents: write
    outputs:
      released: ${{ steps.psr.outputs.released }}
      version: ${{ steps.psr.outputs.version }}
      tag: ${{ steps.psr.outputs.tag }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Python Semantic Release
        id: psr
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # build-wheel + publish-pypi + github-release jobs below own wheel
          # build, PyPI publish, and GitHub Release creation; the docker job
          # owns image build. PSR just bumps + tags + pushes.
          build: "false"
          vcs_release: "false"
          force: ${{ github.event.inputs.force }}
          prerelease: ${{ github.event.inputs.prerelease }}

  docker:
    name: Build & push image (multi-arch)
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # GHCR push
      id-token: write       # OIDC for sigstore-backed attestation
      attestations: write   # actions/attest-build-provenance
    steps:
      # When PSR cut a release, build from the PSR commit (which has the
      # bumped pyproject.toml). Otherwise build from the current main HEAD.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release.outputs.tag || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      # OCI annotations (image.revision in particular) must match the SHA of
      # the source that was actually built. When we check out a tag, that's
      # the PSR commit's SHA, not github.sha (which is the merge commit).
      - name: Resolve build SHA
        id: build_sha
        run: |
          full=$(git rev-parse HEAD)
          short=$(git rev-parse --short=7 HEAD)
          {
            echo "sha=${full}"
            echo "short=${short}"
          } >> "$GITHUB_OUTPUT"

      - name: Compute version components
        id: ver
        if: needs.release.outputs.released == 'true'
        run: |
          version="${{ needs.release.outputs.version }}"
          major="${version%%.*}"
          rest="${version#*.}"
          minor="${rest%%.*}"
          {
            echo "major=${major}"
            echo "minor=${minor}"
            echo "major_minor=${major}.${minor}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=edge
            type=raw,value=sha-${{ steps.build_sha.outputs.short }}
            type=raw,value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}
            type=raw,value=${{ steps.ver.outputs.major_minor }},enable=${{ needs.release.outputs.released == 'true' }}
            type=raw,value=${{ steps.ver.outputs.major }},enable=${{ needs.release.outputs.released == 'true' }}
            type=raw,value=latest,enable=${{ needs.release.outputs.released == 'true' }}
          labels: |
            org.opencontainers.image.title=ddb-explorer-mcp
            org.opencontainers.image.description=Read-only MCP server for Amazon DynamoDB
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.build_sha.outputs.sha }}
            org.opencontainers.image.version=${{ needs.release.outputs.version || format('0.0.0-edge.{0}', steps.build_sha.outputs.short) }}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      # Signed in-toto attestation of the build, verifiable via:
      #   gh attestation verify oci://ghcr.io/<owner>/<repo>:<tag> \
      #       --owner <owner>
      # SLSA Level 3 marker.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  build-wheel:
    name: Build wheel + sdist
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # OIDC for build-provenance attestation
      attestations: write   # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6.4.3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Verify pyproject version matches tag
        run: |
          ref="${{ needs.release.outputs.tag }}"
          expected="${ref#v}"
          actual=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$expected" != "$actual" ]; then
            echo "::error::Tag version ($expected) does not match pyproject.toml version ($actual)"
            exit 1
          fi

      - name: Build
        run: uv build

      # SLSA-Level-3 provenance for the wheel and sdist. Verifiable via:
      #   gh attestation verify dist/<file> --owner <owner>
      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/*"

      - name: Upload dist/
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [release, build-wheel]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ddb-explorer-mcp
    permissions:
      id-token: write       # Trusted Publishing (OIDC)
      attestations: write   # PEP 740 PyPI attestations
    steps:
      - name: Download dist/
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      # `attestations: true` makes gh-action-pypi-publish generate PEP 740
      # attestations and upload them alongside the artifacts. PyPI then
      # displays the verified-publish badge on the project page.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true
          attestations: true

  github-release:
    name: Create GitHub Release
    needs: [release, build-wheel, publish-pypi]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download dist/
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          name: ${{ needs.release.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.release.outputs.tag, '-rc') || contains(needs.release.outputs.tag, '-beta') || contains(needs.release.outputs.tag, '-alpha') }}
          files: |
            dist/*.whl
            dist/*.tar.gz

  publish-npm:
    name: Publish npm wrapper
    needs: release
    if: needs.release.outputs.released == 'true'
    # PSR pushes the tag with GITHUB_TOKEN, which (by GitHub's recursion
    # protection) does NOT fire `npm-publish.yml`'s `on: push: tags:` trigger.
    # We chain it explicitly via workflow_call so the npm wrapper stays in
    # lockstep with PyPI + Docker on every automated release.
    uses: ./.github/workflows/npm-publish.yml
    with:
      tag: ${{ needs.release.outputs.tag }}
    permissions:
      contents: read
    secrets: inherit
